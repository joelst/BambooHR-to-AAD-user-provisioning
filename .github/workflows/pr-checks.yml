name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pester:
    name: Pester Tests (includes PII scan)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0.0

      - name: Run Pester
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path ./tests/ -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            Write-Error "$($result.FailedCount) test(s) failed"
            exit 1
          }

  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Analyze scripts
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning -ReportSummary
          $errors = $results | Where-Object { $_.Severity -eq 'Error' }
          if ($errors) {
            $errors | Format-Table RuleName, ScriptName, Line, Message -AutoSize
            exit 1
          }

  bicep:
    name: Bicep Validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep
        shell: pwsh
        run: |
          az bicep install
          if ($LASTEXITCODE -ne 0) {
            throw 'az bicep install failed'
          }

      - name: Build Bicep templates
        shell: pwsh
        run: |
          $templates = Get-ChildItem -Path .\infra -Filter *.bicep -File -Recurse
          if (-not $templates) {
            throw 'No Bicep templates were found under .\infra'
          }

          foreach ($template in $templates) {
            az bicep build --file $template.FullName --stdout | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw "Bicep build failed for $($template.FullName)"
            }
          }
